{% extends "base.html" %}
{% block content %}

<main id="main-content">
    <section class="section">
        <div class="container">
            <div class="section-header fade-in visible">
                <h2>✍️ Add New Blog Post</h2>
                <p class="subtitle">Pour your thoughts onto the page</p>
                <div class="divider-boho">✦</div>
            </div>

            <div class="form-container fade-in visible">

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-row">
                        <div class="form-group">
                            <label for="blogTitle">Post Title *</label>
                            <input type="text" id="blogTitle" name="title"
                                placeholder="e.g., The Art of Mindful Mornings" required maxlength="150">
                        </div>

                        <div class="form-group">
                            <label for="blogAuthor">Author Name *</label>
                            <input type="text" id="blogAuthor" name="author" placeholder="e.g., Luna Raye" required
                                maxlength="80">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="blogCategory">Category</label>
                            <select id="blogCategory" name="category">
                                <option value="Lifestyle">Lifestyle</option>
                                <option value="Travel">Travel</option>
                                <option value="Wellness">Wellness</option>
                                <option value="Creativity">Creativity</option>
                                <option value="Technology">Technology</option>
                                <option value="Food & Recipes">Food & Recipes</option>
                                <option value="Personal">Personal Stories</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="blogImage">Upload Image</label>
                          <input type="file" id="blogImage" name="image">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="blogExcerpt">Short Excerpt *</label>
                        <input type="text" id="blogExcerpt" name="excerpt" placeholder="A brief, enticing summary..."
                            required maxlength="200">
                    </div>

                    <div class="form-group">
                        <label for="blogContent">Full Content *</label>
                        <textarea id="blogContent" name="content" placeholder="Write your heart out... 🌿"
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="blogTags">Tags</label>
                        <input type="text" id="blogTags" name="tags" placeholder="e.g., mindfulness, self-care">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        ✨ Publish Post
                    </button>

                </form>

            </div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="container">
        <div class="footer-bottom">
            <span>© 2026 Floting Blog. All rights reserved.</span>
        </div>
    </div>
</footer>

{% endblock %}
